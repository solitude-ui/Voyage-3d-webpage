<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Traffic Simulation Game</title>
  </head>
  <body style="padding: 0; border: 0; margin: 0; overflow: hidden; width: 100vw; height: 100vh; background: #231F20;">
    <canvas id="unity-canvas" tabindex="-1" style="width: 100%; height: 100%; display: block; background: #231F20; border: none; outline: none;"></canvas>
    <script src="Build/game.loader.js"></script>
    <script>
      function postUnityScore(score) {
        var numericScore = Number(score);
        if (Number.isFinite(numericScore)) {
          window.parent.postMessage({
            type: "unity-score",
            score: Math.max(0, Math.floor(numericScore))
          }, "*");
        }
      }

      window.UpdateScore = postUnityScore;
      window.SetScore = postUnityScore;
      window.SendScore = postUnityScore;
      window.UnityScore = postUnityScore;
      window.WebGLBridgeScore = postUnityScore;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/game.data.br",
        frameworkUrl: "Build/game.framework.js.br",
        codeUrl: "Build/game.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Traffic Simulation Game",
        productVersion: "0.1",
      }).then((unityInstance) => {
        window.parent.postMessage("unity-loaded", "*");
      });
    </script>
  </body>
</html>
