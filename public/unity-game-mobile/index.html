<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Traffic Simulation Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #231F20;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    #unity-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    #loading-cover,
    #rotate-cover {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0f1115;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #ffffff;
      text-align: center;
    }

    #loading-panel,
    #rotate-panel {
      width: min(86vw, 420px);
    }

    #loading-title,
    #rotate-title {
      margin: 0 0 14px;
      font-size: 22px;
      font-weight: 700;
    }

    #loading-bar {
      width: 100%;
      height: 8px;
      overflow: hidden;
      background: #2b3038;
      border-radius: 999px;
    }

    #loading-fill {
      width: 0%;
      height: 100%;
      background: #35c476;
      transition: width 160ms ease;
    }

    #rotate-text {
      margin: 0 0 18px;
      color: #c9d0dc;
      line-height: 1.45;
      font-size: 15px;
    }

    #play-button {
      border: 0;
      border-radius: 6px;
      padding: 12px 18px;
      background: #35c476;
      color: #08110c;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    #rotate-cover {
      display: none;
    }

    #exit-btn {
      display: none;
      position: fixed;
      top: 150px;
      left: 24px;
      z-index: 999;
      width: 105px;
      height: 28px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.85);
      color: #023B22;
      border: 1px solid rgba(2, 59, 34, 0.15);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 4px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #exit-btn:hover, #exit-btn:active {
      background: rgba(255, 255, 255, 1.0);
      color: #023B22;
    }

    @media (orientation: portrait) {
      #rotate-cover {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <!-- Exit Button -->
  <button id="exit-btn">
    End Simulation
  </button>

  <div id="loading-cover">
    <div id="loading-panel">
      <p id="loading-title">Loading Traffic Simulation Game</p>
      <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>
  </div>

  <div id="rotate-cover">
    <div id="rotate-panel">
      <p id="rotate-title">Rotate your device</p>
      <p id="rotate-text">This game is built for landscape play.</p>
      <button id="play-button" type="button">Play in landscape</button>
    </div>
  </div>

  <script>
    const lessonId = new URLSearchParams(window.location.search).get("lessonId");

    window.reportUnitySessionResult = function(payload) {
      let parsedPayload = payload;

      try {
        const result = JSON.parse(payload);

        if (lessonId && !result.lessonId) {
          result.lessonId = lessonId;
        }

        parsedPayload = JSON.stringify(result);
      } catch (error) {
        console.error("Invalid Unity session result payload:", error);
        return;
      }

      if (window.parent && window.parent !== window) {
        if (typeof window.parent.reportUnitySessionResult === "function") {
          window.parent.reportUnitySessionResult(parsedPayload);
        }

        window.parent.postMessage({
          source: "unity-simulation",
          type: "session-result",
          payload: parsedPayload
        }, window.location.origin);
      }
    };

    function postUnityScore(score) {
      var numericScore = Number(score);
      if (Number.isFinite(numericScore)) {
        window.reportUnitySessionResult(JSON.stringify({
          score: Math.max(0, Math.floor(numericScore)),
          completed: false,
          resultId: "unity-score-" + Date.now()
        }));
      }
    }

    window.UpdateScore = postUnityScore;
    window.SetScore = postUnityScore;
    window.SendScore = postUnityScore;
    window.UnityScore = postUnityScore;
    window.WebGLBridgeScore = postUnityScore;

    const playButton = document.getElementById("play-button");
    const rotateCover = document.getElementById("rotate-cover");

    function requestFullscreen() {
      const docEl = document.documentElement;
      if (docEl.requestFullscreen) {
        docEl.requestFullscreen().catch(err => console.log(err));
      } else if (docEl.mozRequestFullScreen) {
        docEl.mozRequestFullScreen().catch(err => console.log(err));
      } else if (docEl.webkitRequestFullscreen) {
        docEl.webkitRequestFullscreen().catch(err => console.log(err));
      } else if (docEl.msRequestFullscreen) {
        docEl.msRequestFullscreen().catch(err => console.log(err));
      }
    }

    function requestLandscape() {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock("landscape").catch(err => console.log("Orientation lock failed:", err));
      }
    }

    if (playButton) {
      playButton.addEventListener("click", () => {
        requestFullscreen();
        requestLandscape();
        if (rotateCover) {
          rotateCover.style.display = "none";
        }
      });
    }

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const loadingFill = document.querySelector("#loading-fill");
    const exitBtn = document.querySelector("#exit-btn");

    if (exitBtn) {
      exitBtn.addEventListener("click", () => {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage("exit-unity", "*");
        }
      });
    }

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/Game file- mobile.loader.js";
    const config = {
      dataUrl: buildUrl + "/Game file- mobile.data.unityweb",
      frameworkUrl: buildUrl + "/Game file- mobile.framework.js.unityweb",
      codeUrl: buildUrl + "/Game file- mobile.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Adil. Co_",
      productName: "Traffic Simulation Game",
      productVersion: "0.1",
      devicePixelRatio: Math.min(window.devicePixelRatio || 1, 1.5),
      matchWebGLToCanvasSize: true
    };

    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        loadingFill.style.width = (100 * progress) + "%";
      }).then(() => {
        loadingCover.style.display = "none";
        if (exitBtn) exitBtn.style.display = "inline-flex";
        requestLandscape();
        
        window.parent.postMessage("unity-loaded", "*");
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
