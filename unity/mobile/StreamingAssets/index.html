<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="screen-orientation" content="landscape">
  <meta name="x5-orientation" content="landscape">
  <title>Traffic Simulation Game</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #101216;
      font-family: Arial, Helvetica, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #101216;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #101216;
    }

    #loading-cover,
    #rotate-cover {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #101216;
      color: #f4f7fb;
      text-align: center;
    }

    #loading-panel,
    #rotate-panel {
      width: min(86vw, 420px);
    }

    #loading-title,
    #rotate-title {
      margin: 0 0 14px;
      font-size: 22px;
      font-weight: 700;
    }

    #loading-bar {
      width: 100%;
      height: 8px;
      overflow: hidden;
      background: #2b3038;
      border-radius: 999px;
    }

    #loading-fill {
      width: 0%;
      height: 100%;
      background: #35c476;
      transition: width 160ms ease;
    }

    #rotate-text {
      margin: 0 0 18px;
      color: #c9d0dc;
      line-height: 1.45;
      font-size: 15px;
    }

    #play-button {
      border: 0;
      border-radius: 6px;
      padding: 12px 18px;
      background: #35c476;
      color: #08110c;
      font-size: 16px;
      font-weight: 700;
    }

    #rotate-cover {
      display: none;
    }

    @media (orientation: portrait) {
      #rotate-cover {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <div id="loading-cover">
    <div id="loading-panel">
      <p id="loading-title">Loading Traffic Simulation Game</p>
      <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>
  </div>

  <div id="rotate-cover">
    <div id="rotate-panel">
      <p id="rotate-title">Rotate your device</p>
      <p id="rotate-text">This game is built for landscape play.</p>
      <button id="play-button" type="button">Play in landscape</button>
    </div>
  </div>

  <script>
    const lessonId = new URLSearchParams(window.location.search).get("lessonId");

    window.reportUnitySessionResult = function(payload) {
      let parsedPayload = payload;

      try {
        const result = JSON.parse(payload);

        if (lessonId && !result.lessonId) {
          result.lessonId = lessonId;
        }

        parsedPayload = JSON.stringify(result);
      } catch (error) {
        console.error("Invalid Unity session result payload:", error);
        return;
      }

      if (window.parent && window.parent !== window) {
        if (typeof window.parent.reportUnitySessionResult === "function") {
          window.parent.reportUnitySessionResult(parsedPayload);
        }

        window.parent.postMessage({
          source: "unity-simulation",
          type: "session-result",
          payload: parsedPayload
        }, window.location.origin);
      }
    };

    function postUnityScore(score) {
      var numericScore = Number(score);
      if (Number.isFinite(numericScore)) {
        window.reportUnitySessionResult(JSON.stringify({
          score: Math.max(0, Math.floor(numericScore)),
          completed: false,
          resultId: "unity-score-" + Date.now()
        }));
      }
    }

    window.UpdateScore = postUnityScore;
    window.SetScore = postUnityScore;
    window.SendScore = postUnityScore;
    window.UnityScore = postUnityScore;
    window.WebGLBridgeScore = postUnityScore;

    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const loadingFill = document.querySelector("#loading-fill");
    const playButton = document.querySelector("#play-button");

    function resizeCanvas() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
    }

    async function requestLandscape() {
      try {
        if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        }
      } catch (error) {}

      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock("landscape");
        }
      } catch (error) {}

      resizeCanvas();
    }

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", resizeCanvas);
    playButton.addEventListener("click", requestLandscape);
    resizeCanvas();

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/Game file- mobile.loader.js";
    const config = {
      dataUrl: buildUrl + "/Game file- mobile.data.unityweb",
      frameworkUrl: buildUrl + "/Game file- mobile.framework.js.unityweb",
      codeUrl: buildUrl + "/Game file- mobile.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Adil. Co_",
      productName: "Traffic Simulation Game",
      productVersion: "0.1",
      devicePixelRatio: Math.min(window.devicePixelRatio || 1, 1.5),
      matchWebGLToCanvasSize: true
    };

    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        loadingFill.style.width = (100 * progress) + "%";
      }).then(() => {
        loadingCover.style.display = "none";
        requestLandscape();
        window.parent.postMessage("unity-loaded", window.location.origin);
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
