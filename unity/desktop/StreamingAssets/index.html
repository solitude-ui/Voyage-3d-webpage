<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Traffic Simulation Game</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <canvas id="unity-canvas" width=1280 height=720 tabindex="-1" style="width: 1280px; height: 720px; background: #231F20"></canvas>
    <script>
      const lessonId = new URLSearchParams(window.location.search).get("lessonId");

      window.reportUnitySessionResult = function(payload) {
        let parsedPayload = payload;

        try {
          const result = JSON.parse(payload);

          if (lessonId && !result.lessonId) {
            result.lessonId = lessonId;
          }

          parsedPayload = JSON.stringify(result);
        } catch (error) {
          console.error("Invalid Unity session result payload:", error);
          return;
        }

        if (window.parent && window.parent !== window) {
          if (typeof window.parent.reportUnitySessionResult === "function") {
            window.parent.reportUnitySessionResult(parsedPayload);
          }

          window.parent.postMessage({
            source: "unity-simulation",
            type: "session-result",
            payload: parsedPayload
          }, window.location.origin);
        }
      };

      function postUnityScore(score) {
        var numericScore = Number(score);
        if (Number.isFinite(numericScore)) {
          window.reportUnitySessionResult(JSON.stringify({
            score: Math.max(0, Math.floor(numericScore)),
            completed: false,
            resultId: "unity-score-" + Date.now()
          }));
        }
      }

      window.UpdateScore = postUnityScore;
      window.SetScore = postUnityScore;
      window.SendScore = postUnityScore;
      window.UnityScore = postUnityScore;
      window.WebGLBridgeScore = postUnityScore;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";
      }
    </script>
    <script src="Build/Game file with sound.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/Game file with sound.data.br",
        frameworkUrl: "Build/Game file with sound.framework.js.br",
        codeUrl: "Build/Game file with sound.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Traffic Simulation Game",
        productVersion: "0.1",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      }).then(() => {
        window.parent.postMessage("unity-loaded", window.location.origin);
      });
    </script>
  </body>
</html>
